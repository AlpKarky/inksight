# CI: run the same quality checks on every integration to main so broken code,
# formatting drift, or analyzer issues are caught before merge.

name: CI

# Trigger: pushes and PRs targeting main only (adjust if you want CI on all branches).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      # Clone the repo at the commit under test (clean workspace every run).
      - name: Checkout repository
        uses: actions/checkout@v4

      # pubspec lists .env.* as assets; those files are gitignored locally. CI needs them so
      # the analyzer does not report asset_does_not_exist (and images/ must exist).
      - name: Placeholder env files and assets for analysis
        run: |
          cp .env.example .env.dev
          cp .env.example .env.staging
          cp .env.example .env.prod

      # Pin Flutter stable so local and CI use a predictable SDK (change channel if needed).
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # Generated files (*.g.dart, freezed, etc.) are not committed; generate them before
      # analyze/test so the tree matches what developers get after build_runner locally.
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Fail if Dart sources are not dartfmt-formatted (keeps diffs consistent in review).
      - name: Check formatting
        run: dart format --set-exit-if-changed .

      # Treat analyzer info-level issues as errors so small problems cannot pile up ignored.
      - name: Run analyzer
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      # Preserve lcov for download/debugging even when a later step fails (e.g. inspect coverage of partial runs).
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
