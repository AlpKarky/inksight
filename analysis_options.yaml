include: package:very_good_analysis/analysis_options.yaml

analyzer:
  plugins:
    - custom_lint
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    # Document domain + core/errors via nested analysis_options.yaml; see docs/architecture.md.
    public_member_api_docs: false
    one_member_abstracts: false
