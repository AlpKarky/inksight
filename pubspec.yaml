name: inksight
description: "An app that analyzes handwriting using AI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  http: ^1.3.0
  image: ^4.3.0
  image_cropper: ^11.0.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  shared_preferences: ^2.5.2
  supabase_flutter: ^2.12.2
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.6.1
  custom_lint: ^0.8.0
  # Explicit so the analyzer plugin can resolve the builder on CI (see custom_lint + riverpod_lint).
  custom_lint_builder: ^0.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  mocktail: ^1.0.5
  riverpod_generator: ^3.0.0
  # Stay on 3.0.x: 3.1.x has broken custom_lint / entrypoint layout on some Flutter stable CI runs.
  riverpod_lint: ">=3.0.0 <3.1.0"
  very_good_analysis: ^10.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/branding/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/branding/app_icon.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/branding/app_icon.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#FFFFFF"
    image: assets/images/branding/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.staging
    - .env.prod
    - assets/translations/
    - assets/images/
