name: inksight
description: "An app that analyzes handwriting using AI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  connectivity_plus:
  easy_localization:
  flutter:
    sdk: flutter
  flutter_dotenv:
  flutter_localizations:
    sdk: flutter
  flutter_riverpod:
  freezed_annotation:
  go_router:
  http:
  image_cropper:
  image_picker:
  intl:
  json_annotation:
  path_provider:
  riverpod_annotation:
  shared_preferences:
  supabase_flutter:
  uuid:

dev_dependencies:
  build_runner:
  custom_lint:
  flutter_test:
    sdk: flutter
  freezed:
  json_serializable:
  mocktail:
  riverpod_generator:
  riverpod_lint:
  very_good_analysis:

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.staging
    - .env.prod
    - assets/translations/
    - assets/images/
